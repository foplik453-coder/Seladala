<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLACK & WHITE Store</title>
    <style>
        :root {
            --black: #000000;
            --white: #FFFFFF;
            --gray-100: #F5F5F5;
            --gray-200: #E5E5E5;
            --gray-300: #D4D4D4;
            --gray-400: #A3A3A3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-700: #404040;
            --gray-800: #262626;
            --gray-900: #171717;
            --spacing-xs: 8px;
            --spacing-sm: 12px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --border-radius: 12px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: var(--white);
            color: var(--black);
            overflow-x: hidden;
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 2px;
        }

        /* Header */
        .header {
            background: var(--black);
            color: var(--white);
            padding: var(--spacing-md) var(--spacing-lg);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 3px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .logo:hover {
            opacity: 0.8;
        }

        .logo span {
            color: var(--gray-400);
            font-weight: 300;
        }

        .header-actions {
            display: flex;
            gap: var(--spacing-xs);
            align-items: center;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--white);
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.2s;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .cart-count {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--white);
            color: var(--black);
            font-size: 10px;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            padding: 0 4px;
            border: 2px solid var(--black);
        }

        /* Search Bar */
        .search-bar {
            display: flex;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-bar input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--gray-300);
            border-radius: var(--border-radius);
            font-size: 16px;
            background: var(--white);
            color: var(--black);
            transition: all 0.3s;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--black);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
        }

        .search-bar .icon-btn {
            background: var(--gray-100);
            color: var(--black);
            border-radius: var(--border-radius);
            padding: 12px 16px;
        }

        /* Categories Navigation */
        .categories-nav {
            display: flex;
            gap: var(--spacing-sm);
            padding: var(--spacing-md) var(--spacing-lg);
            overflow-x: auto;
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            position: sticky;
            top: 72px;
            z-index: 90;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .categories-nav::-webkit-scrollbar {
            display: none;
        }

        .category-btn {
            padding: 10px 20px;
            background: var(--gray-100);
            border: 2px solid transparent;
            border-radius: 25px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            color: var(--black);
        }

        .category-btn:hover {
            background: var(--gray-200);
            transform: translateY(-1px);
        }

        .category-btn.active {
            background: var(--black);
            color: var(--white);
            border-color: var(--black);
            font-weight: 600;
        }

        /* Main Content */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-md);
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: var(--spacing-md);
        }

        .product-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--border-radius);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--black);
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-image-wrapper {
            position: relative;
            overflow: hidden;
            aspect-ratio: 3/4;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: var(--gray-100);
            transition: transform 0.5s;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-badge {
            position: absolute;
            top: var(--spacing-sm);
            left: var(--spacing-sm);
            background: var(--black);
            color: var(--white);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .quick-add-btn {
            position: absolute;
            bottom: var(--spacing-sm);
            right: var(--spacing-sm);
            width: 36px;
            height: 36px;
            background: var(--white);
            border: none;
            border-radius: 50%;
            box-shadow: var(--shadow);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            color: var(--black);
        }

        .product-card:hover .quick-add-btn {
            opacity: 1;
            transform: translateY(0);
        }

        .quick-add-btn:hover {
            background: var(--black);
            color: var(--white);
        }

        .product-info {
            padding: var(--spacing-sm) var(--spacing-md) var(--spacing-md);
        }

        .product-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-weight: 700;
            font-size: 18px;
            color: var(--black);
            margin-bottom: 4px;
        }

        .product-seller {
            font-size: 12px;
            color: var(--gray-500);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .product-seller-avatar {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--gray-300);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: block;
        }

        .modal-content {
            background: var(--white);
            margin: 20px;
            padding: var(--spacing-xl);
            border-radius: 16px;
            position: relative;
            min-height: 200px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close-btn {
            position: absolute;
            top: var(--spacing-md);
            right: var(--spacing-md);
            background: var(--gray-100);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--black);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: var(--gray-200);
            transform: rotate(90deg);
        }

        /* Product Detail */
        .product-detail {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .product-detail-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: var(--border-radius);
        }

        .product-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
        }

        .product-detail-name {
            font-size: 28px;
            font-weight: 800;
            flex: 1;
        }

        .product-detail-price {
            font-size: 32px;
            font-weight: 800;
            text-align: right;
        }

        .product-detail-description {
            color: var(--gray-600);
            line-height: 1.8;
            font-size: 16px;
        }

        .seller-card {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-lg);
            background: var(--gray-100);
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.2s;
        }

        .seller-card:hover {
            background: var(--gray-200);
            transform: translateY(-2px);
        }

        .seller-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--gray-300);
            object-fit: cover;
        }

        .seller-info {
            flex: 1;
        }

        .seller-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .seller-rating {
            color: var(--gray-500);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .seller-badge {
            background: var(--black);
            color: var(--white);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .size-selector {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }

        .size-btn {
            padding: 12px 20px;
            border: 2px solid var(--gray-300);
            background: var(--white);
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            min-width: 50px;
        }

        .size-btn:hover {
            border-color: var(--black);
        }

        .size-btn.selected {
            background: var(--black);
            color: var(--white);
            border-color: var(--black);
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 16px;
            background: var(--black);
            color: var(--white);
            border: none;
            border-radius: var(--border-radius);
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .add-to-cart-btn:hover {
            background: var(--gray-800);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .add-to-cart-btn:active {
            transform: scale(0.98);
        }

        .add-to-cart-btn.success {
            background: #22c55e;
        }

        /* Cart */
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-xl);
            padding-bottom: var(--spacing-md);
            border-bottom: 3px solid var(--black);
        }

        .cart-header h2 {
            font-size: 24px;
            font-weight: 800;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            max-height: 400px;
            overflow-y: auto;
            padding-right: var(--spacing-sm);
        }

        .cart-item {
            display: flex;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            background: var(--gray-100);
            border-radius: var(--border-radius);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .cart-item-image {
            width: 80px;
            height: 100px;
            object-fit: cover;
            border-radius: var(--border-radius);
        }

        .cart-item-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .cart-item-price {
            font-weight: 700;
            font-size: 18px;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            background: var(--white);
            border-radius: 25px;
            padding: 4px;
        }

        .quantity-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--gray-200);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .quantity-btn:hover {
            background: var(--gray-300);
        }

        .quantity-value {
            font-weight: 600;
            min-width: 24px;
            text-align: center;
        }

        .remove-btn {
            background: transparent;
            border: none;
            color: var(--gray-500);
            cursor: pointer;
            padding: var(--spacing-sm);
            transition: all 0.2s;
            font-size: 14px;
        }

        .remove-btn:hover {
            color: #ef4444;
        }

        .cart-footer {
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 3px solid var(--black);
        }

        .cart-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }

        .cart-total-label {
            font-size: 18px;
            color: var(--gray-600);
        }

        .cart-total {
            font-size: 28px;
            font-weight: 800;
        }

        .checkout-btn {
            width: 100%;
            padding: 18px;
            background: var(--black);
            color: var(--white);
            border: none;
            border-radius: var(--border-radius);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .checkout-btn:hover {
            background: var(--gray-800);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .checkout-btn:disabled {
            background: var(--gray-400);
            cursor: not-allowed;
            transform: none;
        }

        /* Auth Form */
        .auth-content {
            max-width: 420px;
            margin: 40px auto;
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .auth-icon {
            width: 64px;
            height: 64px;
            background: var(--black);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--spacing-md);
            color: var(--white);
            font-size: 28px;
        }

        .auth-content h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: var(--spacing-xs);
        }

        .auth-subtitle {
            color: var(--gray-500);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: var(--spacing-md);
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: var(--spacing-xs);
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--gray-300);
            border-radius: var(--border-radius);
            font-size: 16px;
            transition: all 0.3s;
            background: var(--gray-50, #FAFAFA);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--black);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.05);
        }

        .auth-submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--black);
            color: var(--white);
            border: none;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: var(--spacing-md);
            letter-spacing: 0.5px;
        }

        .auth-submit-btn:hover {
            background: var(--gray-800);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .auth-toggle {
            text-align: center;
            margin-top: var(--spacing-lg);
            color: var(--gray-500);
            font-size: 14px;
        }

        .link-btn {
            background: transparent;
            border: none;
            color: var(--black);
            text-decoration: underline;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
        }

        .link-btn:hover {
            color: var(--gray-600);
        }

        /* Profile */
        .profile-header {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .profile-avatar {
            width: 96px;
            height: 96px;
            background: var(--black);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--spacing-md);
            color: var(--white);
            font-size: 36px;
            font-weight: 700;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .profile-email {
            color: var(--gray-500);
            font-size: 14px;
        }

        .profile-menu {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .profile-menu-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md) var(--spacing-lg);
            background: var(--gray-100);
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            text-align: left;
            width: 100%;
            color: var(--black);
            font-weight: 500;
        }

        .profile-menu-item:hover {
            background: var(--gray-200);
            transform: translateX(4px);
        }

        .profile-menu-item.danger {
            color: #ef4444;
        }

        .profile-menu-item.danger:hover {
            background: #fef2f2;
        }

        /* Announcements */
        .announcements-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .announcement-card {
            border: 1px solid var(--gray-200);
            border-radius: var(--border-radius);
            overflow: hidden;
            background: var(--white);
            transition: all 0.3s;
            cursor: pointer;
        }

        .announcement-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .announcement-image {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }

        .announcement-content {
            padding: var(--spacing-lg);
        }

        .announcement-date {
            font-size: 12px;
            color: var(--gray-500);
            margin-bottom: var(--spacing-xs);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .announcement-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: var(--spacing-sm);
            line-height: 1.3;
        }

        .announcement-description {
            color: var(--gray-600);
            line-height: 1.6;
            margin-bottom: var(--spacing-md);
        }

        .announcement-seller {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--gray-200);
        }

        .announcement-seller-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--black);
            display: flex;
            justify-content: space-around;
            padding: var(--spacing-sm) 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            color: var(--gray-400);
            cursor: pointer;
            font-size: 10px;
            padding: 6px 12px;
            position: relative;
            transition: all 0.2s;
            font-weight: 500;
        }

        .nav-btn.active {
            color: var(--white);
        }

        .nav-btn.active::before {
            content: '';
            position: absolute;
            top: -8px;
            width: 20px;
            height: 2px;
            background: var(--white);
            border-radius: 1px;
        }

        .nav-badge {
            position: absolute;
            top: -2px;
            right: 4px;
            background: var(--white);
            color: var(--black);
            font-size: 9px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        /* Empty States */
        .empty-state {
            text-align: center;
            padding: 60px var(--spacing-xl);
            color: var(--gray-400);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: var(--spacing-md);
            opacity: 0.3;
        }

        .empty-state-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-600);
            margin-bottom: var(--spacing-sm);
        }

        .empty-state-text {
            color: var(--gray-500);
            margin-bottom: var(--spacing-lg);
        }

        .empty-state-btn {
            display: inline-block;
            padding: 12px 32px;
            background: var(--black);
            color: var(--white);
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .empty-state-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--black);
            color: var(--white);
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 600;
            z-index: 300;
            animation: toastIn 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: var(--spacing-sm);
            }
            
            .modal-content {
                margin: 10px;
                padding: var(--spacing-lg);
            }
            
            .product-detail-name {
                font-size: 22px;
            }
            
            .product-detail-price {
                font-size: 24px;
            }
        }

        @media (min-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .products-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        function loadFromStorage() {
            const savedCart = localStorage.getItem('bw_cart');
            if (savedCart) state.cart = JSON.parse(savedCart);
            
            const savedUser = localStorage.getItem('bw_user');
            if (savedUser) state.currentUser = JSON.parse(savedUser);
            
            if (tgUser && !state.currentUser) {
                state.currentUser = {
                    name: [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' '),
                    email: (tgUser.username || 'user') + '@telegram.com',
                    id: tgUser.id
                };
                localStorage.setItem('bw_user', JSON.stringify(state.currentUser));
            }
        }

        function saveCart() {
            localStorage.setItem('bw_cart', JSON.stringify(state.cart));
        }

        function saveUser() {
            if (state.currentUser) {
                localStorage.setItem('bw_user', JSON.stringify(state.currentUser));
            } else {
                localStorage.removeItem('bw_user');
            }
        }

        // ==================== UTILS ====================
        function updateCartUI() {
            const count = state.cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
            document.getElementById('bottomCartCount').textContent = count || '0';
        }

        function showToast(message, duration = 2000) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        function formatPrice(price) {
            return price.toLocaleString() + ' ₽';
        }

        // ==================== PRODUCTS ====================
        function filterCategory(category) {
            state.currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                const btnText = btn.textContent.toLowerCase();
                btn.classList.toggle('active', 
                    category === 'all' ? btnText === 'все' : btnText.includes(category)
                );
            });
            renderProducts();
        }

        function searchProducts() {
            state.searchQuery = document.getElementById('searchInput').value.toLowerCase();
            renderProducts();
        }

        function toggleSearch() {
            const searchBar = document.getElementById('searchBar');
            if (searchBar.style.display === 'none' || !searchBar.style.display) {
                searchBar.style.display = 'flex';
                setTimeout(() => document.getElementById('searchInput').focus(), 100);
            } else {
                searchBar.style.display = 'none';
                document.getElementById('searchInput').value = '';
                state.searchQuery = '';
                renderProducts();
            }
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.style.display = 'grid';
            document.getElementById('announcementsList').style.display = 'none';
            
            let filtered = products;
            
            if (state.currentCategory !== 'all') {
                filtered = filtered.filter(p => p.category === state.currentCategory);
            }
            
            if (state.searchQuery) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(state.searchQuery) ||
                    p.description.toLowerCase().includes(state.searchQuery) ||
                    p.seller.name.toLowerCase().includes(state.searchQuery)
                );
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">🔍</div>
                        <div class="empty-state-title">Ничего не найдено</div>
                        <div class="empty-state-text">Попробуйте изменить параметры поиска</div>
                        <button class="empty-state-btn" onclick="resetFilters()">Сбросить фильтры</button>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = filtered.map(product => `
                <div class="product-card" onclick="openProductDetail(${product.id})">
                    <div class="product-image-wrapper">
                        <img src="${product.image}" alt="${product.name}" class="product-image" loading="lazy">
                        ${product.badge ? `<span class="product-badge">${product.badge}</span>` : ''}
                        <button class="quick-add-btn" onclick="event.stopPropagation(); quickAdd(${product.id})" title="Быстрое добавление">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                        </button>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-price">${formatPrice(product.price)}</p>
                        <p class="product-seller">
                            <img src="${product.seller.avatar}" alt="${product.seller.name}" class="product-seller-avatar">
                            ${product.seller.name}
                        </p>
                    </div>
                </div>
            `).join('');
        }

        function quickAdd(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const existingItem = state.cart.find(item => item.product.id === productId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                state.cart.push({
                    product: product,
                    quantity: 1,
                    size: product.sizes[0]
                });
            }
            
            saveCart();
            updateCartUI();
            showToast('✅ ' + product.name + ' добавлен в корзину');
        }

        function openProductDetail(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            state.selectedSize = null;
            
            const modal = document.getElementById('productModal');
            const detail = document.getElementById('productDetail');
            
            detail.innerHTML = `
                <div class="product-detail">
                    <img src="${product.image}" alt="${product.name}" class="product-detail-image">
                    
                    <div class="product-detail-header">
                        <h2 class="product-detail-name">${product.name}</h2>
                        <p class="product-detail-price">${formatPrice(product.price)}</p>
                    </div>
                    
                    <p class="product-detail-description">${product.description}</p>
                    
                    <div>
                        <label class="form-label" style="margin-bottom: 8px;">Размер</label>
                        <div class="size-selector">
                            ${product.sizes.map(size => `
                                <button class="size-btn" onclick="selectSize('${size}', this)">${size}</button>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="seller-card" onclick="openSellerProfile(${product.seller.id})">
                        <img src="${product.seller.avatar}" alt="${product.seller.name}" class="seller-avatar">
                        <div class="seller-info">
                            <p class="seller-name">${product.seller.name}</p>
                            <p class="seller-rating">⭐ ${product.seller.rating} · ${product.seller.products} товаров</p>
                        </div>
                        <span class="seller-badge">Продавец</span>
                    </div>
                    
                    <button class="add-to-cart-btn" id="addToCartDetailBtn" onclick="addToCartDetail(${product.id})">
                        Добавить в корзину
                    </button>
                </div>
            `;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function selectSize(size, btn) {
            state.selectedSize = size;
            btn.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function addToCartDetail(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const size = state.selectedSize || product.sizes[0];
            
            const existingItem = state.cart.find(item => 
                item.product.id === productId && item.size === size
            );
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                state.cart.push({
                    product: product,
                    quantity: 1,
                    size: size
                });
            }
            
            saveCart();
            updateCartUI();
            
            const btn = document.getElementById('addToCartDetailBtn');
            btn.textContent = '✓ Добавлено!';
            btn.classList.add('success');
            setTimeout(() => {
                btn.textContent = 'Добавить в корзину';
                btn.classList.remove('success');
            }, 1500);
            
            showToast('✅ Товар добавлен в корзину');
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function openSellerProfile(sellerId) {
            const seller = products.find(p => p.seller.id === sellerId)?.seller;
            if (!seller) return;
            
            const sellerProducts = products.filter(p => p.seller.id === sellerId);
            
            document.getElementById('productDetail').innerHTML = `
                <div style="text-align: center; margin-bottom: 24px;">
                    <img src="${seller.avatar}" alt="${seller.name}" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 12px;">
                    <h2 style="font-size: 22px; font-weight: 800;">${seller.name}</h2>
                    <p style="color: var(--gray-500);">⭐ ${seller.rating} · ${seller.products} товаров</p>
                </div>
                <h3 style="margin-bottom: 16px;">Товары продавца</h3>
                <div style="display: grid; gap: 12px;">
                    ${sellerProducts.map(p => `
                        <div style="display: flex; gap: 12px; padding: 12px; background: var(--gray-100); border-radius: var(--border-radius); cursor: pointer;" onclick="openProductDetail(${p.id})">
                            <img src="${p.image}" alt="${p.name}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">
                            <div>
                                <p style="font-weight: 600;">${p.name}</p>
                                <p style="font-weight: 700;">${formatPrice(p.price)}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function resetFilters() {
            state.currentCategory = 'all';
            state.searchQuery = '';
            document.getElementById('searchInput').value = '';
            document.getElementById('searchBar').style.display = 'none';
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === 'Все');
            });
            renderProducts();
        }

        function resetToHome() {
            resetFilters();
            switchTab('catalog');
        }

        // ==================== CART ====================
        function renderCart() {
            const cartItems = document.getElementById('cartItems');
            const cartFooter = document.getElementById('cartFooter');
            
            if (state.cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🛒</div>
                        <div class="empty-state-title">Корзина пуста</div>
                        <div class="empty-state-text">Добавьте товары из каталога</div>
                        <button class="empty-state-btn" onclick="closeCart(); switchTab('catalog')">В каталог</button>
                    </div>
                `;
                cartFooter.style.display = 'none';
                return;
            }
            
            cartFooter.style.display = 'block';
            
            const total = state.cart.reduce((sum, item) => sum + item.product.price * item.quantity, 0);
            document.getElementById('cartTotal').textContent = formatPrice(total);
            
            cartItems.innerHTML = state.cart.map((item, index) => `
                <div class="cart-item">
                    <img src="${item.product.image}" alt="${item.product.name}" class="cart-item-image">
                    <div class="cart-item-info">
                        <div>
                            <p class="cart-item-name">${item.product.name}</p>
                            <p style="color: var(--gray-500); font-size: 13px;">Размер: ${item.size}</p>
                            <p class="cart-item-price">${formatPrice(item.product.price * item.quantity)}</p>
                        </div>
                        <div class="cart-item-controls">
                            <div class="quantity-control">
                                <button class="quantity-btn" onclick="updateQuantity(${index}, -1)">−</button>
                                <span class="quantity-value">${item.quantity}</span>
                                <button class="quantity-btn" onclick="updateQuantity(${index}, 1)">+</button>
                            </div>
                            <button class="remove-btn" onclick="removeFromCart(${index})">Удалить</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateQuantity(index, change) {
            state.cart[index].quantity += change;
            if (state.cart[index].quantity <= 0) {
                state.cart.splice(index, 1);
                showToast('Товар удален из корзины');
            }
            saveCart();
            updateCartUI();
            renderCart();
        }

        function removeFromCart(index) {
            const name = state.cart[index].product.name;
            state.cart.splice(index, 1);
            saveCart();
            updateCartUI();
            renderCart();
            showToast('🗑 ' + name + ' удален');
        }

        function openCart() {
            renderCart();
            document.getElementById('cartModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeCart() {
            document.getElementById('cartModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function checkout() {
            if (!state.currentUser) {
                showToast('⚠️ Войдите в аккаунт для оформления заказа');
                closeCart();
                setTimeout(() => openProfile(), 500);
                return;
            }
            
            if (state.cart.length === 0) {
                showToast('🛒 Корзина пуста');
                return;
            }
            
            const orderData = {
                items: state.cart,
                total: state.cart.reduce((sum, item) => sum + item.product.price * item.quantity, 0),
                user: state.currentUser,
                date: new Date().toISOString()
            };
            
            if (tg) {
                tg.sendData(JSON.stringify(orderData));
                tg.close();
            } else {
                alert('Заказ оформлен!\n\nСумма: ' + formatPrice(orderData.total) + '\n\nСпасибо за покупку!');
                state.cart = [];
                saveCart();
                updateCartUI();
                closeCart();
                showToast('✅ Заказ успешно оформлен!');
            }
        }

        // ==================== AUTH & PROFILE ====================
        function openAuth() {
            closeAllModals();
            document.getElementById('authModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            updateAuthUI();
        }

        function closeAuth() {
            document.getElementById('authModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function toggleAuthMode() {
            state.isAuthMode = state.isAuthMode === 'login' ? 'register' : 'login';
            updateAuthUI();
        }

        function updateAuthUI() {
            const title = document.getElementById('authTitle');
            const subtitle = document.getElementById('authSubtitle');
            const submitBtn = document.getElementById('authSubmitBtn');
            const toggleText = document.getElementById('authToggleText');
            const toggleBtn = document.getElementById('authToggleBtn');
            
            if (state.isAuthMode === 'register') {
                title.textContent = 'Регистрация';
                subtitle.textContent = 'Создайте аккаунт для покупок';
                submitBtn.textContent = 'Зарегистрироваться';
                toggleText.textContent = 'Уже есть аккаунт?';
                toggleBtn.textContent = 'Войти';
            } else {
                title.textContent = 'Вход в аккаунт';
                subtitle.textContent = 'Войдите для доступа ко всем функциям';
                submitBtn.textContent = 'Войти';
                toggleText.textContent = 'Нет аккаунта?';
                toggleBtn.textContent = 'Зарегистрироваться';
            }
        }

        function handleAuth(event) {
            event.preventDefault();
            
            const name = document.getElementById('authName').value.trim();
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            
            if (!name || !email || !password) {
                showToast('⚠️ Заполните все поля');
                return;
            }
            
            if (password.length < 6) {
                showToast('⚠️ Пароль должен быть не менее 6 символов');
                return;
            }
            
            state.currentUser = {
                name,
                email,
                id: Date.now()
            };
            
            saveUser();
            closeAuth();
            showToast('✅ ' + (state.isAuthMode === 'register' ? 'Регистрация успешна!' : 'Вход выполнен!'));
            openProfile();
        }

        function logout() {
            state.currentUser = null;
            saveUser();
            closeProfile();
            showToast('👋 Вы вышли из аккаунта');
        }

        function openProfile() {
            closeAllModals();
            const modal = document.getElementById('profileModal');
            const content = document.getElementById('profileContent');
            
            if (state.currentUser) {
                content.innerHTML = `
                    <div class="profile-header">
                        <div class="profile-avatar">${state.currentUser.name[0].toUpperCase()}</div>
                        <h2 class="profile-name">${state.currentUser.name}</h2>
                        <p class="profile-email">${state.currentUser.email}</p>
                    </div>
                    <div class="profile-menu">
                        <button class="profile-menu-item" onclick="switchTab('announcements'); closeProfile()">
                            📢 Объявления
                        </button>
                        <button class="profile-menu-item" onclick="alert('История заказов будет доступна в следующем обновлении')">
                            📦 Мои заказы
                        </button>
                        <button class="profile-menu-item" onclick="alert('Настройки будут доступны в следующем обновлении')">
                            ⚙️ Настройки
                        </button>
                        <button class="profile-menu-item danger" onclick="logout()">
                            🚪 Выйти
                        </button>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👤</div>
                        <div class="empty-state-title">Вы не авторизованы</div>
                        <div class="empty-state-text">Войдите в аккаунт для доступа к профилю и заказам</div>
                        <button class="empty-state-btn" onclick="openAuth()">Войти</button>
                    </div>
                `;
            }
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeProfile() {
            document.getElementById('profileModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function closeAllModals() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.body.style.overflow = '';
        }

        // ==================== ANNOUNCEMENTS ====================
        function renderAnnouncements() {
            const grid = document.getElementById('productsGrid');
            const list = document.getElementById('announcementsList');
            
            grid.style.display = 'none';
            list.style.display = 'flex';
            
            list.innerHTML = announcements.map(a => `
                <div class="announcement-card">
                    <img src="${a.image}" alt="${a.title}" class="announcement-image" loading="lazy">
                    <div class="announcement-content">
                        <p class="announcement-date">${a.date}</p>
                        <h3 class="announcement-title">${a.title}</h3>
                        <p class="announcement-description">${a.description}</p>
                        <div class="announcement-seller">
                            <img src="${a.seller.avatar}" alt="${a.seller.name}" class="announcement-seller-avatar">
                            <div>
                                <p style="font-weight: 600;">${a.seller.name}</p>
                                <p style="color: var(--gray-500); font-size: 12px;">Официальный продавец</p>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ==================== TABS ====================
        function switchTab(tab) {
            state.currentTab = tab;
            
            document.querySelectorAll('.nav-btn').forEach((btn, i) => {
                const tabs = ['catalog', 'announcements', 'cart', 'profile'];
                btn.classList.toggle('active', tabs[i] === tab);
            });
            
            if (tab === 'catalog') {
                document.getElementById('productsGrid').style.display = 'grid';
                document.getElementById('announcementsList').style.display = 'none';
                renderProducts();
            } else if (tab === 'announcements') {
                renderAnnouncements();
            } else if (tab === 'cart') {
                openCart();
            } else if (tab === 'profile') {
                openProfile();
            }
        }

        // ==================== INIT ====================
        function init() {
            loadFromStorage();
            updateCartUI();
            renderProducts();
            
            // Закрытие модальных окон при клике на фон
            window.addEventListener('click', function(event) {
                if (event.target.classList.contains('modal')) {
                    event.target.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });
            
            // Закрытие по Escape
            window.addEventListener('keydown', function(event) {
                if (event.key === 'Escape') {
                    closeAllModals();
                }
            });
            
            console.log('🖤 BLACK & WHITE Store готов к работе');
            console.log('👤 Пользователь:', state.currentUser ? state.currentUser.name : 'Не авторизован');
            console.log('🛒 Товаров в корзине:', state.cart.length);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
  </html>
